name: Build and Push Docker Image (Frontend)

on:
  push:
    branches: [main]

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/akkercheval/bccmusic-frontend
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Update GitOps repo with new backend image
        if: github.ref == 'refs/heads/main' # only on main branch
        run: |
          # Clone the gitops repo with write access
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git clone https://x-access-token:${{ secrets.GITOPS_PAT }}@github.com/akkercheval/bccmusic-gitops.git gitops
          cd gitops

          # Update the image to the exact sha- tag your build already pushes
          sed -i "s|image: ghcr.io/akkercheval/bccmusic-frontend:.*|image: ghcr.io/akkercheval/bccmusic-frontend:sha-${{ github.sha }}|g" \
            apps/bccmusic-frontend/deployment.yaml

          # Optional but nice: force a rollout even if the tag somehow matched
          sed -i "/imagePullPolicy: Always/a \            # Auto-updated by CI on ${{ github.sha }}" \
            apps/bccmusic-frontend/deployment.yaml

          git add apps/bccmusic-frontend/deployment.yaml
          git commit -m "chore: update frontend image to sha-${{ github.sha }} (build #${{ github.run_number }})" || echo "No changes"
          git push origin main
